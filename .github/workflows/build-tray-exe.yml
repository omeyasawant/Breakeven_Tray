name: Build Breakeven_Tray Distributables

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows
            upload_path: dist/Breakeven_Tray.exe

          - os: ubuntu-latest
            artifact_suffix: linux
            upload_path: dist/Breakeven_Tray-x86_64.AppImage

          - os: macos-latest
            artifact_suffix: macos
            upload_path: dist/Breakeven_Tray.app.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: breakeven-tray
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict
          auto-update-conda: true

      - name: Install core dependencies (conda)
        shell: bash -l {0}
        run: |
          conda install -y             python="3.11"             setuptools             pip

      - name: Install pip dependencies
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.3.0

      - name: Install Linux Qt runtime helpers
        if: runner.os == 'Linux'
        shell: bash -l {0}
        run: |
          sudo apt-get update
          sudo apt-get install -y             libxcb-icccm4             libxcb-image0             libxcb-keysyms1             libxcb-render-util0             libxcb-shape0             libxcb-util1             libxcb-xinerama0             libxcb-xkb1             libxkbcommon-x11-0

      - name: Build (Windows .exe)
        if: runner.os == 'Windows'
        shell: bash -l {0}
        run: |
          python -m PyInstaller --onefile --windowed tray_app.py             --name Breakeven_Tray             --add-data "icon.png;."             --hidden-import psutil             --hidden-import requests             --hidden-import packaging             --hidden-import PyQt5

      - name: Build (macOS .app zip)
        if: runner.os == 'macOS'
        shell: bash -l {0}
        run: |
          python -m PyInstaller --onedir --windowed tray_app.py             --name Breakeven_Tray             --add-data "icon.png:."             --hidden-import psutil             --hidden-import requests             --hidden-import packaging             --hidden-import PyQt5

          ditto -c -k --sequesterRsrc --keepParent "dist/Breakeven_Tray.app" "dist/Breakeven_Tray.app.zip"

      - name: Build (Linux AppImage)
        if: runner.os == 'Linux'
        shell: bash -l {0}
        run: |
          python -m PyInstaller --clean --noconfirm --onedir --windowed tray_app.py             --name Breakeven_Tray             --add-data "icon.png:."             --hidden-import psutil             --hidden-import requests             --hidden-import packaging             --hidden-import PyQt5             --hidden-import PyQt5.QtCore             --hidden-import PyQt5.QtGui             --hidden-import PyQt5.QtWidgets

          rm -rf AppDir
          mkdir -p AppDir/usr/lib
          cp -a dist/Breakeven_Tray AppDir/usr/lib/Breakeven_Tray
          APPROOT="AppDir/usr/lib/Breakeven_Tray"
          mkdir -p "$APPROOT/qt-host-libs"

          for helper_lib in             /usr/lib/x86_64-linux-gnu/libxcb-icccm.so.4             /usr/lib/x86_64-linux-gnu/libxcb-image.so.0             /usr/lib/x86_64-linux-gnu/libxcb-keysyms.so.1             /usr/lib/x86_64-linux-gnu/libxcb-render-util.so.0             /usr/lib/x86_64-linux-gnu/libxcb-shape.so.0             /usr/lib/x86_64-linux-gnu/libxcb-util.so.1             /usr/lib/x86_64-linux-gnu/libxcb-xinerama.so.0             /usr/lib/x86_64-linux-gnu/libxcb-xkb.so.1             /usr/lib/x86_64-linux-gnu/libxkbcommon-x11.so.0
          do
            if [ -f "$helper_lib" ]; then
              cp -aL "$helper_lib"* "$APPROOT/qt-host-libs/"
            fi
          done

          rm -f             "$APPROOT/_internal/libX11.so."*             "$APPROOT/_internal/libX11-xcb.so."*             "$APPROOT/_internal/libXau.so."*             "$APPROOT/_internal/libXdmcp.so."*             "$APPROOT/_internal/libXext.so."*             "$APPROOT/_internal/libxcb.so."*             "$APPROOT/_internal/libxcb-"*".so."*             "$APPROOT/_internal/libxkbcommon.so."*             "$APPROOT/_internal/libxkbcommon-x11.so."*             "$APPROOT/_internal/libwayland-"*".so."*

          cat > AppDir/Breakeven_Tray.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Breakeven Tray
          Exec=Breakeven_Tray
          Icon=Breakeven_Tray
          Categories=Utility;
          Terminal=false
          EOF

          cp icon.png AppDir/Breakeven_Tray.png

          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          set -eu
          HERE="$(dirname "$(readlink -f "$0")")"
          APPROOT="$HERE/usr/lib/Breakeven_Tray"
          QT_PLUGIN_PRIMARY="$APPROOT/_internal/PyQt5/Qt5/plugins"
          QT_PLUGIN_FALLBACK="$APPROOT/_internal/PyQt5/Qt/plugins"
          QT_LIB_PRIMARY="$APPROOT/_internal/PyQt5/Qt5/lib"
          QT_LIB_FALLBACK="$APPROOT/_internal/PyQt5/Qt/lib"
          QT_COMPAT_LIBS="$APPROOT/qt-host-libs"
          if [ -d "$QT_PLUGIN_PRIMARY" ] && [ -d "$QT_LIB_PRIMARY" ]; then
            QT_PLUGIN_ROOT="$QT_PLUGIN_PRIMARY"
            QT_LIB_ROOT="$QT_LIB_PRIMARY"
          else
            QT_PLUGIN_ROOT="$QT_PLUGIN_FALLBACK"
            QT_LIB_ROOT="$QT_LIB_FALLBACK"
          fi
          export QT_PLUGIN_PATH="$QT_PLUGIN_ROOT${QT_PLUGIN_PATH:+:$QT_PLUGIN_PATH}"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$QT_PLUGIN_ROOT/platforms"
          export LD_LIBRARY_PATH="$QT_LIB_ROOT:$QT_COMPAT_LIBS${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          if [ "${BREAKEVEN_QT_DEBUG_PLUGINS:-0}" = "1" ]; then
            export QT_DEBUG_PLUGINS=1
          fi
          exec "$APPROOT/Breakeven_Tray" "$@"
          EOF
          chmod +x AppDir/AppRun

          curl -L -o appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ./squashfs-root/AppRun AppDir dist/Breakeven_Tray-x86_64.AppImage
          chmod +x dist/Breakeven_Tray-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Breakeven_Tray-${{ matrix.artifact_suffix }}
          path: ${{ matrix.upload_path }}
